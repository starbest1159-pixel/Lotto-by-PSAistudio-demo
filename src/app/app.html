<router-outlet />

<!-- Elegant Toast Notifications Area -->
@if (toasts().length > 0) {
  <div class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 max-w-sm w-full pointer-events-none md:max-w-md">
    @for (toast of toasts(); track toast.id) {
      <div 
        [class]="'pointer-events-auto p-4 rounded-xl border border-slate-100 shadow-2xl flex items-start gap-3 bg-white text-slate-800 transition-all duration-300 transform translate-y-0 ' + getToastClass(toast.type)"
        role="alert"
      >
        <mat-icon [class]="getIconClass(toast.type)">{{ getIconName(toast.type) }}</mat-icon>
        <div class="flex-1">
          <div class="font-bold text-slate-900 text-sm mb-0.5">{{ toast.title }}</div>
          <p class="text-xs text-slate-650 leading-relaxed break-all font-medium">{{ toast.message }}</p>
          @if (toast.technical) {
            <details class="mt-2 text-[10px] text-slate-500 font-mono">
              <summary class="cursor-pointer hover:underline font-bold">ข้อมูลทางเทคนิค (Technical Info)</summary>
              <div class="mt-1 bg-slate-900/5 p-2 rounded-lg break-all max-h-32 overflow-y-auto border border-black/5 leading-normal">
                {{ toast.technical }}
              </div>
            </details>
          }
        </div>
        <button (click)="dismiss(toast.id)" class="text-slate-400 hover:text-slate-600 transition-colors cursor-pointer self-start p-1 hover:bg-slate-50 rounded-lg">
          <mat-icon class="!w-4 !h-4 text-[16px] flex items-center justify-center">close</mat-icon>
        </button>
      </div>
    }
  </div>
}
